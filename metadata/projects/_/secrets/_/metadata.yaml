resource:
  idAttribute: /name
  aliasAttribute: /name
  remoteCollectionPath: /storage/keys/project/{{.project}}
operations:
  create:
    method: POST
    path: /storage/keys/project/{{.project}}/{{.id}}
    headers:
      - Accept: application/json
      - Content-Type: application/x-rundeck-data-password
    transforms:
      - jqExpression: if type == "object" and has("content") then .content else . end
  get:
    path: /storage/keys/project/{{.project}}/{{.id}}
    headers:
      - Accept: application/json
    transforms:
      - jqExpression: 'if type == "object" and has("meta") then {name: (.name // "{{.id}}"), type: (.meta["Rundeck-key-type"] // "password"), contentType: (.meta["Rundeck-content-type"] // "application/x-rundeck-data-password")} else {name: (.name // "{{.id}}"), type: (.type // (if (.contentType // "") == "application/pgp-keys" then "public" elif (.contentType // "") == "application/octet-stream" then "private" else "password" end)), contentType: (.contentType // (if (.type // "") == "public" then "application/pgp-keys" elif (.type // "") == "private" then "application/octet-stream" else "application/x-rundeck-data-password" end))} end'
  update:
    method: PUT
    path: /storage/keys/project/{{.project}}/{{.id}}
    headers:
      - Accept: application/json
      - Content-Type: application/x-rundeck-data-password
    transforms:
      - jqExpression: if type == "object" and has("content") then .content else . end
  delete:
    path: /storage/keys/project/{{.project}}/{{.id}}
  list:
    path: /storage/keys/project/{{.project}}
    headers:
      - Accept: application/json
    transforms:
      - jqExpression: '(.resources // []) | map(select(.type == "file" and ((.meta["Rundeck-key-type"] // "password") == "password")) | {name: .name, type: "password", contentType: (.meta["Rundeck-content-type"] // "application/x-rundeck-data-password")})'
  compare:
    path: /storage/keys/project/{{.project}}/{{.id}}
    headers:
      - Accept: application/json
    transforms:
      - jqExpression: 'if type == "object" and has("meta") then {name: (.name // "{{.id}}"), type: (.meta["Rundeck-key-type"] // "password"), contentType: (.meta["Rundeck-content-type"] // "application/x-rundeck-data-password")} else {name: (.name // "{{.id}}"), type: (.type // (if (.contentType // "") == "application/pgp-keys" then "public" elif (.contentType // "") == "application/octet-stream" then "private" else "password" end)), contentType: (.contentType // (if (.type // "") == "public" then "application/pgp-keys" elif (.type // "") == "private" then "application/octet-stream" else "application/x-rundeck-data-password" end))} end'
