resource:
  idAttribute: /name
  aliasAttribute: /name
operations:
  get:
    path: /project/{{.id}}/config
    transforms:
      - jqExpression: 'if type == "object" and has("config") then {name: (.name // "{{.id}}"), description: (.description // (.config["project.description"] // "")), config: (.config + {"project.name": (.name // "{{.id}}") } + (if has("description") and (.description | type == "string") then {"project.description": .description} else {} end))} else {name: "{{.id}}", description: (."project.description" // ""), config: (. + {"project.name": (."project.name" // "{{.id}}")})} end'
  create:
    method: POST
    path: /projects
    transforms:
      - jqExpression: 'if type == "object" and has("config") then {name: (.name // "{{.id}}"), config: (.config + {"project.name": (.name // "{{.id}}") } + (if has("description") and (.description | type == "string") then {"project.description": .description} else {} end))} else {name: "{{.id}}", config: (. + {"project.name": (."project.name" // "{{.id}}")})} end'
  update:
    method: PUT
    path: /project/{{.id}}/config
    transforms:
      - jqExpression: 'if type == "object" and has("config") then (.config + {"project.name": (.name // "{{.id}}") } + (if has("description") and (.description | type == "string") then {"project.description": .description} else {} end)) else (. + {"project.name": (."project.name" // "{{.id}}")}) end'
  delete:
    path: /project/{{.id}}
  list:
    path: /projects
  compare:
    path: /project/{{.id}}/config
    transforms:
      - jqExpression: 'if type == "object" and has("config") then {name: (.name // "{{.id}}"), description: (.description // (.config["project.description"] // "")), config: (.config + {"project.name": (.name // "{{.id}}") } + (if has("description") and (.description | type == "string") then {"project.description": .description} else {} end))} else {name: "{{.id}}", description: (."project.description" // ""), config: (. + {"project.name": (."project.name" // "{{.id}}")})} end'
